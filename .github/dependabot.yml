version: 2
updates:
  # Enable version updates for npm dependencies (pnpm compatible)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group all non-major updates together
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group frontend major updates by category
      react-major:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"
      vite-major:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "rolldown-vite"
        update-types:
          - "major"
      ui-major:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "major"
      testing-major:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
        update-types:
          - "major"
    ignore:
      # Ignore updates for packages that require manual migration
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Enable security updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
