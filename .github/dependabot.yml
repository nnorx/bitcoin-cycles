version: 2
updates:
  # Enable version updates for npm dependencies (pnpm compatible)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    assignees:
      - "nnorx"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group all non-major updates together
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group major updates by category
      vite-major:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "rolldown-vite"
        update-types:
          - "major"
      ui-major:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "lucide-react"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
          - "tw-animate-css"
        update-types:
          - "major"
      d3-major:
        patterns:
          - "d3-*"
        update-types:
          - "major"
      testing-major:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
        update-types:
          - "major"
      dev-tooling-major:
        patterns:
          - "@biomejs/biome"
          - "knip"
          - "babel-plugin-react-compiler"
        update-types:
          - "major"
    ignore:
      # Ignore updates for packages that require manual migration
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Enable security updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "nnorx"
    labels:
      - "dependencies"
      - "github-actions"
